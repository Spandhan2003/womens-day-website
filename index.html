<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magical Women’s Day 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff9a9e,#fbc2eb,#ffdde1,#f8bbd0);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    position:relative;
}
@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* Dark overlay for contrast */
.overlay-bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.35);
    z-index:0;
}

/* Floating hearts and petals */
.float{
    position:absolute;
    pointer-events:none;
    z-index:1;
    font-size:18px;
    animation:floaty linear infinite;
}
@keyframes floaty{
    0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}

/* Pages */
.page{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    z-index:2;
    padding:20px;
}

/* Question Typewriter */
.question{
    font-family:'Pacifico',cursive;
    font-size:2.5rem;
    color:#fff;
    text-shadow:0 0 15px #ff69b4,0 0 30px #ff1493;
    max-width:90%;
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid #fff;
    animation:typing 4s steps(50,end) forwards,blink .8s step-end infinite;
}
@keyframes typing{
    from{width:0;}
    to{width:100%;}
}
@keyframes blink{
    50%{border-color:transparent;}
}

/* Buttons */
button{
    margin-top:35px;
    padding:12px 28px;
    border:none;
    border-radius:30px;
    background:#fff;
    color:#e91e63;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}
button:hover{
    transform:scale(1.08);
    background:#ff4e8b;
    color:white;
}

/* Hide elements */
.hidden{display:none}

/* Main page text */
.main h2{
    font-size:2rem;
    color:#fff;
    text-shadow:0 3px 10px rgba(0,0,0,0.7);
}
.main p{
    margin-top:10px;
    font-size:1.1rem;
    color:#ffeef5;
}

/* Mirror */
.mirror{
    width:280px;
    height:340px;
    border-radius:25px;
    border:8px solid #fff;
    box-shadow:0 0 30px #ff69b4,0 0 50px rgba(255,105,180,0.5);
    overflow:hidden;
    margin:25px 0;
    background:white;
    position:relative;
}

/* Video mirror */
video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

/* Glowing YOU */
.you{
    font-size:28px;
    font-weight:bold;
    color:#fff;
    margin-top:5px;
    text-shadow:0 0 10px #ff1493,0 0 25px #ff69b4;
    animation:pulse 1.5s infinite;
}
@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.08)}
    100%{transform:scale(1)}
}

/* Sparkle */
.sparkle{
    position:absolute;
    font-size:18px;
    pointer-events:none;
    z-index:3;
    animation:sparkleAnim 1s linear forwards;
}
@keyframes sparkleAnim{
    0%{opacity:1;transform:translate(0,0) scale(1);}
    100%{opacity:0;transform:translate(calc(var(--x)*1px),calc(var(--y)*1px)) scale(0);}
}
</style>
</head>
<body>

<div class="overlay-bg"></div>

<!-- Floating Hearts and Petals -->
<script>
for(let i=0;i<25;i++){
    let el=document.createElement("div");
    el.className="float";
    el.innerHTML=Math.random()<0.5?"💗":"🌸";
    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(6+Math.random()*5)+"s";
    el.style.fontSize=(15+Math.random()*25)+"px";
    document.body.appendChild(el);
}
</script>

<!-- Cover Page -->
<div class="page cover" id="cover">
    <div class="question">Mirror, mirror on the wall… Who is the strongest of them all? 💖</div>
    <p>Tap below to find out ✨</p>
    <button id="revealBtn">Reveal 💌</button>
</div>

<!-- Main Page -->
<div class="page main hidden" id="main">
    <h2>Happy Women's Day 🌸</h2>
    <div class="mirror">
        <video id="video" autoplay playsinline></video>
    </div>
    <div class="you">YOU 💖</div>
    <p>The strongest and most beautiful soul ✨</p>
</div>

<script>
const revealBtn=document.getElementById("revealBtn");
const cover=document.getElementById("cover");
const main=document.getElementById("main");

// Function to create sparkle trail
function createSparkle(x,y){
    const sparkle=document.createElement("div");
    sparkle.className="sparkle";
    sparkle.innerHTML="✨";
    sparkle.style.left=x+"px";
    sparkle.style.top=y+"px";
    sparkle.style.setProperty("--x", (Math.random()*100-50));
    sparkle.style.setProperty("--y", (Math.random()*-100-50));
    document.body.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),1000);
}

// Request camera on reveal click
revealBtn.addEventListener("click", async e=>{
    // Sparkle burst
    for(let i=0;i<15;i++){
        createSparkle(e.clientX,e.clientY);
    }
    // Request camera
    try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        document.getElementById("video").srcObject=stream;
    }catch{
        alert("Please allow camera access 💕");
    }
    // Animate pages
    cover.classList.add("hidden");
    main.classList.remove("hidden");
});
</script>
</body>
</html>
