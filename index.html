<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magical Women’s Day 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background: radial-gradient(circle at 20% 20%, #050005 0%, #000 80%);
    background-color:#000;
    position:relative;
}

/* Soft glow */
.lux-glow{
    position:absolute;
    width:320px;
    height:320px;
    background:radial-gradient(circle, rgba(255,105,180,0.08), transparent 70%);
    border-radius:50%;
    animation:moveGlow 20s linear infinite alternate;
    z-index:0;
}
@keyframes moveGlow{
    0%{transform:translate(0,0);}
    100%{transform:translate(220px,160px);}
}

.overlay-bg{
    position:fixed;
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.6);
    z-index:0;
}

/* Floating background elements */
.float{
    position:absolute;
    pointer-events:none;
    z-index:1;
    animation:floaty linear infinite;
    opacity:0.7;
    filter:drop-shadow(0 0 8px #ff4da6);
}

@keyframes floaty{
    0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}

.page{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    z-index:2;
    padding:20px;
}

.question{
    font-family:'Pacifico', cursive;
    color:#fff;
    text-shadow:0 0 20px #ff69b4,0 0 40px #ff1493;
    white-space:pre-wrap;
    font-size:2rem;
    line-height:1.3em;
}

.blink{
    border-right:3px solid #fff;
    animation:blink .8s step-end infinite;
}
@keyframes blink{
    50% { border-color: transparent; }
}

button{
    margin-top:25px;
    padding:10px 24px;
    border:none;
    border-radius:30px;
    background:#ff2e88;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 20px #ff2e88;
}
button:hover{
    transform:scale(1.08);
    background:#ff1493;
}

.hidden{display:none;}

.main h2{
    color:#fff;
    text-shadow:0 0 15px #ff2e88;
}

.mirror{
    width:250px;
    height:300px;
    border-radius:25px;
    border:6px solid #fff;
    box-shadow:0 0 50px #ff2e88;
    overflow:hidden;
    margin:20px 0;
    background:black;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

/* Crown animation */
.crown{
    font-size:40px;
    animation:floatCrown 2s ease-in-out infinite;
    filter:drop-shadow(0 0 10px gold);
}

@keyframes floatCrown{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.you{
    font-size:28px;
    font-weight:bold;
    color:#fff;
    text-shadow:0 0 20px #ff1493;
    animation:pulse 1.5s infinite;
}
@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.08)}
    100%{transform:scale(1)}
}

/* Sparkle twinkles near crown */
.twinkle{
    position:absolute;
    font-size:18px;
    animation:twinkleAnim 1.5s infinite alternate;
    pointer-events:none;
}
@keyframes twinkleAnim{
    0%{opacity:0.2; transform:scale(0.8);}
    100%{opacity:1; transform:scale(1.2);}
}

/* Click burst */
.sparkle{
    position:absolute;
    font-size:18px;
    pointer-events:none;
    animation:sparkleAnim 1s linear forwards;
}
@keyframes sparkleAnim{
    0%{opacity:1;transform:translate(0,0) scale(1);}
    100%{opacity:0;transform:translate(calc(var(--x)*1px),calc(var(--y)*1px)) scale(0);}
}
</style>
</head>
<body>

<div class="overlay-bg"></div>
<div class="lux-glow" style="top:8%; left:8%;"></div>
<div class="lux-glow" style="bottom:8%; right:8%;"></div>

<script>
// Floating 💗 🌸 ✨
for(let i=0;i<25;i++){
    let el=document.createElement("div");
    el.className="float";
    el.innerHTML = ["💗","🌸","✨"][Math.floor(Math.random()*3)];
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(14+Math.random()*20)+"px";
    el.style.animationDuration=(8+Math.random()*6)+"s";
    document.body.appendChild(el);
}
</script>

<div class="page cover" id="cover">
    <div class="question blink" id="question">
Mirror, mirror on the wall…
Who is the strongest of them all? 💗
    </div>
    <p style="color:#ffe6f2;">Tap below to find out 🌸</p>
    <button id="revealBtn">Reveal 💌</button>
</div>

<div class="page main hidden" id="main">
    <h2>Happy Women's Day 🌸</h2>
    <div class="mirror">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="crown">👑</div>
    <div class="you">YOU 💗</div>
    <p style="color:#ffe6f2;">The strongest and most beautiful soul 🌸</p>

    <!-- Twinkles -->
    <div class="twinkle" style="top:20%; left:45%;">✨</div>
    <div class="twinkle" style="top:25%; left:55%;">✨</div>
</div>

<script>
// Typewriter
const questionEl = document.getElementById("question");
const fullText = questionEl.textContent;
questionEl.textContent="";
let i=0;
function typeWriter(){
    if(i<fullText.length){
        questionEl.textContent+=fullText[i];
        i++;
        setTimeout(typeWriter,50);
    }
}
typeWriter();

// Click sparkle burst
function createSparkle(x,y){
    const sparkle=document.createElement("div");
    sparkle.className="sparkle";
    sparkle.innerHTML=["💗","✨"][Math.floor(Math.random()*2)];
    sparkle.style.left=x+"px";
    sparkle.style.top=y+"px";
    sparkle.style.setProperty("--x",(Math.random()*120-60));
    sparkle.style.setProperty("--y",(Math.random()*-120-60));
    document.body.appendChild(sparkle);
    setTimeout(()=>sparkle.remove(),1000);
}

const revealBtn=document.getElementById("revealBtn");
const cover=document.getElementById("cover");
const main=document.getElementById("main");

revealBtn.addEventListener("click", async e=>{
    for(let i=0;i<20;i++) createSparkle(e.clientX,e.clientY);
    try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        document.getElementById("video").srcObject=stream;
    }catch{
        alert("Please allow camera access 💕");
    }
    cover.classList.add("hidden");
    main.classList.remove("hidden");
});
</script>

</body>
</html>
